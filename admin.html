<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="https://maaru-jp.github.io/Countdown/" />
  <title>開團管理後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://maaru-jp.github.io/Countdown/css/styles.css" />
  <link rel="stylesheet" href="https://maaru-jp.github.io/Countdown/css/admin.css" />
</head>
<body>
  <div class="theme-bg admin-bg" aria-hidden="true"></div>

  <header class="header">
    <a href="index.html" class="admin-link">← 回展示頁</a>
    <div class="theme-switcher">
      <button type="button" class="theme-btn active" data-theme="dawn">晨曦</button>
      <button type="button" class="theme-btn" data-theme="night">星空</button>
      <button type="button" class="theme-btn" data-theme="sakura">櫻花</button>
    </div>
  </header>

  <main class="admin-main">
    <h1 class="admin-title">開團資料管理</h1>
    <p class="admin-desc">填寫後將自動匯入 Google 試算表（不從試算表讀取 ID）</p>

    <section class="existing-list-section" id="existingListSection">
      <h2 class="existing-list-title">現有開團（本機）</h2>
      <p class="existing-list-desc">點「載入編輯」可帶入該筆資料，只改狀態或進度後再儲存，無需重填團名與圖片。編輯後送出會同步更新試算表（需先有列號）。</p>
      <button type="button" class="btn btn-secondary" id="loadFromSheetBtn" onclick="if(window.loadFromSheet){window.loadFromSheet();} return false;">從試算表載入列表（取得列號以支援同步更新）</button>
      <div class="existing-list-box" id="existingListBox"></div>
      <input type="hidden" id="editingId" name="editingId" value="" />
      <button type="button" class="btn btn-secondary" id="clearEditBtn" style="display:none;">取消編輯，改為新增一筆</button>
    </section>

    <form id="groupForm" class="admin-form">
      <div class="form-row">
        <label for="title">商品名稱 <span class="required">*</span></label>
        <input type="text" id="title" name="title" required placeholder="例：日本直送草莓禮盒" />
      </div>

      <div class="form-row">
        <label for="imageUrl">商品圖片網址（選填，開團中商品建議填寫）</label>
        <input type="url" id="imageUrl" name="imageUrl" placeholder="https://example.com/photo.jpg" />
      </div>

      <div class="form-row">
        <label>標籤</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="badge" value="new" /> 新品</label>
          <label class="radio-label"><input type="radio" name="badge" value="hot" checked /> 熱銷</label>
          <label class="radio-label"><input type="radio" name="badge" value="recommend" /> 推薦</label>
        </div>
      </div>

      <div class="form-row two-col">
        <div>
          <label for="startDate">開團日期 <span class="required">*</span></label>
          <input type="date" id="startDate" name="startDate" required />
        </div>
        <div>
          <label for="endDate">結團日期 <span class="required">*</span></label>
          <input type="date" id="endDate" name="endDate" required />
        </div>
      </div>

      <div class="form-row">
        <label>狀態</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="status" value="upcoming" /> 即將開團</label>
          <label class="radio-label"><input type="radio" name="status" value="ongoing" checked /> 正在開團</label>
          <label class="radio-label"><input type="radio" name="status" value="ended" /> 已結團</label>
        </div>
      </div>

      <div class="form-row">
        <label for="registeredCount">登記預購人數（選填，展示為「共 N 位」）</label>
        <input type="number" id="registeredCount" name="registeredCount" min="0" step="1" placeholder="例：10" />
      </div>

      <div class="form-row">
        <label>進度節點（依序勾選已完成的階段）</label>
        <div class="progress-edit">
          <label class="check-label"><input type="checkbox" name="p1" data-name="收單中" /> 收單中</label>
          <label class="check-label"><input type="checkbox" name="p2" data-name="等待出荷" /> 等待出荷</label>
          <label class="check-label"><input type="checkbox" name="p3" data-name="集運中" /> 集運中</label>
          <label class="check-label"><input type="checkbox" name="p4" data-name="抵台" /> 抵台</label>
          <label class="check-label"><input type="checkbox" name="p5" data-name="已完成出貨" /> 已完成出貨</label>
        </div>
      </div>

      <div class="form-row">
        <label for="countdownTo">倒數目標時間（選填，用於開團倒數；不填則以開團日中午 12:00 為準）</label>
        <input type="datetime-local" id="countdownTo" name="countdownTo" />
      </div>

      <div class="form-row">
        <label for="expectedShipDate">預計出貨日（選填，正在開團時顯示「預計出貨倒數」）</label>
        <input type="date" id="expectedShipDate" name="expectedShipDate" />
      </div>

      <div class="form-row">
        <label for="shipDelayDays">出貨延長天數（選填，廠商延誤時填數字，例：3 表示預計出貨日再延 3 天）</label>
        <input type="number" id="shipDelayDays" name="shipDelayDays" min="0" step="1" placeholder="例：3" />
      </div>

      <div class="form-row form-actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">送出並匯入 Google 試算表</button>
        <button type="button" class="btn btn-secondary" id="saveLocalBtn">僅儲存至本機（不傳送試算表）</button>
      </div>
    </form>

    <div class="config-box" id="configBox">
      <h3>Google 試算表設定（選填）</h3>
      <p>若要自動匯入 Google 試算表，請先部署 Google Apps Script，並將「網路應用程式網址」貼在下方。</p>
      <label for="scriptUrl">Apps Script 網址</label>
      <input type="url" id="scriptUrl" placeholder="https://script.google.com/macros/s/AKfycbwWhXRlPZdIRxoqvMM5YjV2T3LQpQyvPNfEw224VChETr5c8ASEZOR6pA6zoMO5BGky/exec" />
      <button type="button" class="btn btn-secondary" id="testScriptBtn" style="margin-top:0.5rem;">測試連線（開新分頁）</button>
      <p class="hint">部署步驟請見專案中的 <code>GoogleAppsScript.md</code>。先按「測試連線」確認網址與試算表正常。</p>
    </div>

    <div class="message" id="message" role="status" aria-live="polite"></div>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
